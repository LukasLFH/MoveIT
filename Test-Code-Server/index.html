<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhr</title>
</head>
<body>
    <div id="clock"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('time', (time) => {
            document.getElementById('clock').innerText = time;
        });
    </script>
</body>
</html>
